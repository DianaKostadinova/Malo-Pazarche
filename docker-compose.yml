version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: malopazeche-postgres
    environment:
      POSTGRES_USER: malopazeche
      POSTGRES_PASSWORD: malopazeche_devpass_2026
      POSTGRES_DB: malopazeche
      POSTGRES_INITDB_ARGS: -c default_text_search_config=english
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - malopazeche-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malopazeche"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: malopazeche-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - malopazeche-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (.NET 8)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: malopazeche-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=malopazeche;User Id=malopazeche;Password=malopazeche_devpass_2026;
      - Redis__ConnectionString=redis:6379
      - Jwt__SecretKey=your-very-long-secret-key-for-jwt-development-must-be-at-least-32-characters
      - Jwt__Issuer=malopazeche.mk
      - Jwt__Audience=malopazeche-users
      - AllowedHosts=*
      - CORS__AllowedOrigins__0=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - malopazeche-network
    volumes:
      - ./backend/src:/app/src
    command: >
      bash -c "
        dotnet ef database update -p src/MaloPazarche.Infrastructure &&
        dotnet run --project src/MaloPazarche.API
      "

  # Frontend React/Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: malopazeche-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:5000
      - NEXT_PUBLIC_IMAGE_CDN=http://localhost:5000/uploads
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - malopazeche-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  # pgAdmin (PostgreSQL Management UI) - Optional
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: malopazeche-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@malopazeche.mk
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - malopazeche-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  malopazeche-network:
    driver: bridge
